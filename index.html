<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚖ AI Legal Assistant (Multilingual + Voice)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      background-image: url('4144596.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }
    /* Glassmorphic card */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
    }
    /* Smooth placeholder color */
    ::placeholder {
      color: #6366F1;
      opacity: 0.7;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="glass-card rounded-3xl w-full max-w-4xl p-8 border-t-8 border-indigo-500">
    <h1 class="text-4xl font-extrabold text-center text-indigo-800 mb-3 drop-shadow-md">
      ⚖ AI Legal Assistant
    </h1>


    <!-- Language Selection -->
    <div class="mb-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Select Language:</label>
        <select id="languageSelect" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 bg-gradient-to-r from-indigo-50 to-blue-50 transition-all duration-300">
          <option value="kn">Kannada (ಕನ್ನಡ)</option>
          <option value="en">English</option>
          <option value="hi">Hindi (हिन्दी)</option>
          <option value="bn">Bengali (বাংলা)</option>
          <option value="ta">Tamil (தமிழ்)</option>
          <option value="te">Telugu (తెలుగు)</option>
          <option value="ml">Malayalam (മലയാളം)</option>
          <option value="gu">Gujarati (ગુજરાતી)</option>
          <option value="mr">Marathi (मराठी)</option>
          <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
          
        </select>
      </div>
    </div>

    <!-- Input Text / Voice -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center mb-6 gap-4">
      <textarea id="crimeStory" rows="4" class="flex-1 border border-gray-300 rounded-2xl p-4 focus:ring-2 focus:ring-indigo-400 resize-none shadow-inner transition-all duration-300" placeholder="🎙 Speak or type your crime story..."></textarea>
      <button id="micBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-4 shadow-lg transition-transform transform hover:scale-110 flex items-center justify-center text-2xl">
        <i class="fas fa-microphone"></i>
      </button>
    </div>

    <!-- Submit Button -->
    <button id="analyzeBtn" class="w-full sm:w-auto bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-blue-600 hover:to-indigo-600 text-white font-bold rounded-2xl py-3 px-6 mb-6 shadow-lg transition-transform transform hover:scale-105 flex items-center justify-center">
      <i class="fas fa-gavel mr-2"></i> Analyze Crime
    </button>

    <!-- Output Section -->
    <div id="output" class="hidden mt-6 p-6 bg-gradient-to-r from-indigo-50 to-blue-50 border-l-8 border-indigo-600 rounded-2xl shadow-md transition-all duration-300">
      <h2 class="text-2xl font-bold text-indigo-800 mb-4 flex items-center">
        <i class="fas fa-search mr-2"></i> Legal Analysis
      </h2>
      <p id="result" class="text-gray-800 whitespace-pre-wrap leading-relaxed"></p>

      <!-- Speak Output -->
      <button id="speakBtn" class="mt-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl py-2 px-6 font-semibold shadow-md transition-transform transform hover:scale-105 flex items-center">
        <i class="fas fa-volume-up mr-2"></i> Speak
      </button>
    </div>
  </div>

  <script>
    const backendURL = "";

    const analyzeBtn = document.getElementById("analyzeBtn");
    const micBtn = document.getElementById("micBtn");
    const speakBtn = document.getElementById("speakBtn");
    const outputDiv = document.getElementById("output");
    const resultText = document.getElementById("result");

    // --- Analyze Text ---
    analyzeBtn.addEventListener("click", async () => {
      const story = document.getElementById("crimeStory").value.trim();
      const lang = document.getElementById("languageSelect").value;
      if (!story) return alert("Please enter or speak a crime story first.");

      analyzeBtn.disabled = true;
      analyzeBtn.textContent = "Analyzing... ⏳";

      const res = await fetch(`${backendURL}/analyze`,{
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ story, output_language: lang }),
      });
      const data = await res.json();
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = "Analyze Crime";

      if (data.error) {
        resultText.textContent = "❌ Error: " + data.error;
      } else {
        resultText.textContent = `
📂 Crime Category: ${data.crimeCategory}
⚖  Relevant Section: ${data.relevantSection}
⛓  Punishment: ${data.punishmentSummary}
🧾 Explanation: ${data.simplifiedExplanation}
        `;
      }

      outputDiv.classList.remove("hidden");
    });

    // --- Voice Input (Speech to Text) ---
    let mediaRecorder;
    let audioChunks = [];

    micBtn.addEventListener("click", async () => {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
          const formData = new FormData();
          formData.append("audio", audioBlob);

          micBtn.textContent = "Processing...";

          const res = await fetch(`${backendURL}/speech-to-text`, { method: "POST", body: formData });
          const data = await res.json();

          micBtn.innerHTML = '<i class="fas fa-microphone"></i>';

          if (data.transcription) {
            document.getElementById("crimeStory").value = data.transcription;
          } else {
            alert("Speech recognition failed: " + data.error);
          }
        };

        mediaRecorder.start();
        micBtn.innerHTML = '<i class="fas fa-stop"></i>';
      } catch (err) {
        alert("Microphone access denied or not available.");
      }
    });

    // --- Speak Output ---
    speakBtn.addEventListener("click", async () => {
      const text = resultText.textContent.trim();
      const lang = document.getElementById("languageSelect").value;

      if (!text) return alert("Nothing to speak.");

      const langMap = {
        "en": "en", "hi": "hi", "bn": "bn", "ta": "ta", "te": "te",
        "ml": "ml", "gu": "gu", "mr": "mr", "pa": "pa", "kn": "kn"
      };

      const res = await fetch(`${backendURL}/text-to-speech`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, language: langMap[lang] || "en" }),
      });

      const blob = await res.blob();
      const audio = new Audio(URL.createObjectURL(blob));
      audio.play();
    });
  </script>
</body>
</html>
